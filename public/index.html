<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Edge Relay</title>
  <style>
    body{background:#0a0a0a;color:#fff;font-family:system-ui;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
    .status{text-align:center}
    .dot{display:inline-block;width:10px;height:10px;background:#00ff88;border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  </style>
</head>
<body>
  <div class="status">
    <span class="dot"></span>
    <h2>Edge Relay Active</h2>
    <p>Status: Operational</p>
  </div>
</body>
</html>
